{%extends "firstapp/index.html"%}
{%block content%}
<div  class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="max-width:420px; width:100%;">
        <h2 class="text-center mb-4">Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3"><input class="form-control" type="text" placeholder="Username" name="username"></div>
            <div class="mb-3"><input class="form-control"type="password" placeholder="Password" name="password"></div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
           
        </form>
         <p class="text-center mt-3">
            Don't have an account?
            <a href="{% url 'signup' %}">Sign Up</a>
        </p>
    </div>
</div>
{%endblock content%}
