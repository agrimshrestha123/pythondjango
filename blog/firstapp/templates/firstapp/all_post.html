{%extends "firstapp/index.html"%}
{%block content%}
{%if posts%}
{%for post in posts%}
<div>
    {{post.title}}
    {{post.author}}
    {{post.content}}
    {{post.category}}
    {{post.created_at}}
</div>  
{%endfor%}
{%else%}
<p>no post available</p>
{{error_message}}
{%endif%}
{%endblock content%}
